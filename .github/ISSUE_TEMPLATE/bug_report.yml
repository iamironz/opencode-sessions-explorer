name: Bug report
description: Report a bug or regression
title: "bug: "
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues
          required: true
        - label: I read the README and CHANGELOG
          required: false
  - type: textarea
    attributes:
      label: What happened
      description: A clear and concise description of the bug.
      placeholder: When I call the search-text tool, ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide minimal, repeatable steps.
      placeholder: |-
        1. Load the plugin in OpenCode ...
        2. Invoke the <tool> tool with ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      placeholder: The tool should return ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
      placeholder: The tool fails with ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Dependency check output
      description: Paste the output of `bun src/bin/check-deps.ts` (run from the repo root).
      render: text
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs
      description: Paste relevant output, stack traces, or the error envelope.
      render: text
    validations:
      required: false
  - type: input
    attributes:
      label: OpenCode version
      placeholder: opencode --version
    validations:
      required: true
  - type: input
    attributes:
      label: Bun version
      placeholder: bun --version
    validations:
      required: true
  - type: input
    attributes:
      label: OS
      placeholder: macOS 14.3, Ubuntu 22.04
    validations:
      required: true
  - type: input
    attributes:
      label: Plugin version
      description: npm version, git commit, or release tag.
      placeholder: git rev-parse HEAD
    validations:
      required: false
  - type: input
    attributes:
      label: Affected tool name
      description: The opencode-sessions-explorer-* tool involved, if applicable.
      placeholder: opencode-sessions-explorer-search-text
    validations:
      required: false
